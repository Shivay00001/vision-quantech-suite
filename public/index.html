<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vision-quantech-suite - Enterprise Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #ec4899; --dark: #0f172a; --light: #f8fafc; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--dark); color: var(--light); overflow-x: hidden; }
        .bg-mesh { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.2), transparent 25%), radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.2), transparent 25%); z-index: -1; animation: pulse 10s ease-in-out infinite alternate; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }
        header { text-align: center; margin-bottom: 4rem; }
        h1 { font-size: 4rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; text-transform: capitalize; }
        p.subtitle { font-size: 1.25rem; color: #94a3b8; max-width: 600px; margin: 0 auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 3rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: transform 0.3s ease; }
        .glass-panel:hover { transform: translateY(-5px); }
        .btn { display: inline-block; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 1rem 2rem; border-radius: 9999px; text-decoration: none; font-weight: 600; margin-top: 2rem; transition: opacity 0.3s, transform 0.3s; }
        .btn:hover { opacity: 0.9; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="container">
        <header>
            <h1>vision quantech suite</h1>
            <p class="subtitle">Next-generation enterprise software platform, beautifully crafted and production-ready.</p>
        </header>
        <div class="glass-panel">
            <h2>Welcome to the Dashboard</h2>
            <p>Your system is currently running optimally. All services are connected.</p>
            <a href="#" class="btn">Launch Application</a>
        </div>
    </div>
</body>
</html>
